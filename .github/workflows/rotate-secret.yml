name: Rotate App Secret (Lab)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'   # Weekly Sunday 02:00 UTC

jobs:
  rotate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Rotate Secret If Needed
        shell: pwsh
        run: ./scripts/01-rotate-secret.ps1
        env:
          TARGET_APP_OBJECT_ID: ${{ secrets.TARGET_APP_OBJECT_ID }}
          KV_NAME: ${{ secrets.KV_NAME }}
          KV_SECRET_NAME: ${{ secrets.KV_SECRET_NAME }}

      - name: Update Key Vault
        if: env.NEW_SECRET_CREATED == 'true'
        shell: pwsh
        run: ./scripts/02-update-kv.ps1
        env:
          KV_NAME: ${{ secrets.KV_NAME }}
          KV_SECRET_NAME: ${{ secrets.KV_SECRET_NAME }}
          NEW_SECRET_VALUE: ${{ env.NEW_SECRET_VALUE }}
          NEW_SECRET_EXPIRY: ${{ env.NEW_SECRET_EXPIRY }}

      - name: Update VM
        if: env.NEW_SECRET_CREATED == 'true'
        shell: pwsh
        run: ./scripts/03-update-vm.ps1
        env:
          VM_NAME: ${{ secrets.VM_NAME }}
          VM_RG:  ${{ secrets.VM_RG }} 
          NEW_SECRET_VALUE: ${{ env.NEW_SECRET_VALUE }}