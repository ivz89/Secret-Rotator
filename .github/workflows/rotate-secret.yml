name: Rotate App Secret (Lab)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'   # Weekly - Sunday 02:00 UTC

jobs:
  rotate-secret:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Rotate If Needed
        env:
          TARGET_APP_OBJECT_ID: ${{ secrets.TARGET_APP_OBJECT_ID }}
          KV_NAME: iv-dev-kv
          KV_RG: iv-dev-rg-Security
          KV_SECRET_NAME: log-forwarder-app-01
          VM_NAME: LogCollector-01
          VM_RG: iv-dev-rg-VM
        run: |

          echo "Checking Key Vault secret expiry..."

          SECRET_JSON=$(az keyvault secret show \
            --vault-name $KV_NAME \
            --name $KV_SECRET_NAME)

          CURRENT_EXPIRY=$(echo "$SECRET_JSON" | jq -r '.attributes.expires')

          if [ "$CURRENT_EXPIRY" = "null" ]; then
            echo "No existing secret found. Rotating now."
            ROTATE=true
          else
            NOW_EPOCH=$(date -u +%s)
            EXPIRY_EPOCH=$(date -u -d "$CURRENT_EXPIRY" +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

            echo "Days left until expiry: $DAYS_LEFT"

            if [ "$DAYS_LEFT" -le 30 ]; then
              ROTATE=true
            else
              ROTATE=false
            fi
          fi

          if [ "$ROTATE" = false ]; then
            echo "No rotation required."
            exit 0
          fi

          echo "Rotating secret..."

          START_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          END_DATE=$(date -u -d "+90 days" '+%Y-%m-%dT%H:%M:%SZ')

          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://graph.microsoft.com \
            --query accessToken -o tsv)

          NEW_SECRET_JSON=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            https://graph.microsoft.com/v1.0/applications/$TARGET_APP_OBJECT_ID/addPassword \
            -d "{
                  \"passwordCredential\": {
                    \"displayName\": \"rotated-by-github\",
                    \"startDateTime\": \"$START_DATE\",
                    \"endDateTime\": \"$END_DATE\"
                  }
                }")

          NEW_SECRET_VALUE=$(echo "$NEW_SECRET_JSON" | jq -r '.secretText // empty')

          if [ -z "$NEW_SECRET_VALUE" ]; then
            echo "Secret creation failed!"
            echo "$NEW_SECRET_JSON"
            exit 1
          fi

          echo "New secret created."

          # --- ALWAYS update Key Vault ---
          echo "Updating Key Vault..."
          az keyvault secret set \
            --vault-name $KV_NAME \
            --name $KV_SECRET_NAME \
            --value "$NEW_SECRET_VALUE" \
            --expires "$END_DATE" \
            --resource-group $KV_RG

          echo "Key Vault updated."

          # --- Check VM power state ---
          echo "Checking VM power state..."

          VM_STATE=$(az vm get-instance-view \
            --resource-group $VM_RG \
            --name $VM_NAME \
            --query "instanceView.statuses[?starts_with(code, 'PowerState/')].code" \
            -o tsv)

          echo "VM state: $VM_STATE"

          if [[ "$VM_STATE" == "PowerState/running" ]]; then
            echo "VM is running. Updating Logstash keystore..."

            az vm run-command invoke \
              --resource-group $VM_RG \
              --name $VM_NAME \
              --command-id RunShellScript \
              --scripts "
                echo '$NEW_SECRET_VALUE' | \
                /usr/share/logstash/bin/logstash-keystore add client_secret --stdin --force
                systemctl restart logstash
              "

            echo "VM updated successfully."
          else
            echo "VM is not running. Skipping VM update."
          fi

          echo "Rotation workflow complete."