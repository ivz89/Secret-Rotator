name: Rotate Secret

permissions:
  id-token: write
  contents: read


on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '* * * */1 *' # every minute (UTC) for testing

jobs:
  rotate-secret:
    runs-on: ubuntu-latest
    steps:

      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Login to Azure via OIDC
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # Step 3: Rotate target app secret in Azure AD
      - name: Rotate target app secret
        env:
          APP_OBJECT_ID: ${{ secrets.TARGET_APP_OBJECT_ID }}
        run: |
          echo "Generating access token for Microsoft Graph..."
          ACCESS_TOKEN=$(az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)

          echo "Rotating secret for app $APP_OBJECT_ID"

          # Calculate start and end dates
          START_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          END_DATE=$(date -u -d "+7 days" '+%Y-%m-%dT%H:%M:%SZ')

          # Add a new secret via Graph API
          NEW_SECRET_JSON=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            https://graph.microsoft.com/v1.0/applications/$APP_OBJECT_ID/addPassword \
            -d "{
                  \"passwordCredential\": {
                    \"displayName\": \"rotated-by-github\",
                    \"startDateTime\": \"$START_DATE\",
                    \"endDateTime\": \"$END_DATE\"
                  }
                }")

          # Extract secret value
          NEW_SECRET_VALUE=$(echo "$NEW_SECRET_JSON" | jq -r '.secretText // empty')

          if [ -z "$NEW_SECRET_VALUE" ]; then
            echo "ERROR: Secret was not created!"
            echo "$NEW_SECRET_JSON"
            exit 1
          fi

          echo "New secret created successfully."

      # Step 4: Update GitHub environment secret
      - name: Update GitHub environment secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}   # REQUIRED for gh CLI
          NEW_SECRET_VALUE: ${{ steps.rotate.outputs.NEW_SECRET_VALUE || '' }}
        run: |
          echo "$NEW_SECRET_VALUE" | gh secret set LOGSTASH_APP_SECRET --body - --repo $GITHUB_REPOSITORY