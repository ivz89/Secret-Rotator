name: Rotate App Secret - Test

# Triggers: every minute (testing), push to main, or manual
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '*/1 * * * *'  # Every minute UTC for testing

permissions:
  id-token: write
  contents: read

jobs:
  rotate-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Azure login using branch-restricted OIDC federated credential
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}       # Rotator app
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}       # Your Entra tenant ID
          allow-no-subscriptions: true

      # Get Microsoft Graph access token
      - name: Get Graph Access Token
        run: |
          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://graph.microsoft.com \
            --query accessToken -o tsv)
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      # Rotate the target app secret
      - name: Rotate App Secret in Entra
        id: rotate
        run: |
          APP_OBJECT_ID=${{ secrets.TARGET_APP_OBJECT_ID }}
          SECRET_NAME="rotated-by-github"
          EXPIRY=$(date -u -d "+30 minutes" '+%Y-%m-%dT%H:%M:%SZ')  # Short expiry for testing

          echo "Rotating secret for app: $APP_OBJECT_ID"

          NEW_SECRET_JSON=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            https://graph.microsoft.com/v1.0/applications/$APP_OBJECT_ID/addPassword \
            -d "{
                  \"passwordCredential\": {
                    \"displayName\": \"$SECRET_NAME\",
                    \"endDateTime\": \"$EXPIRY\"
                  }
                }")

          NEW_SECRET_VALUE=$(echo $NEW_SECRET_JSON | jq -r '.secretText')
          echo "NEW_SECRET_VALUE=$NEW_SECRET_VALUE" >> $GITHUB_ENV
          echo "Secret rotated successfully."

      # Update GitHub secret using GH_PAT
      - name: Update GitHub Secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "$NEW_SECRET_VALUE" | gh secret set LOGSTASH_APP_SECRET --body - --repo $GITHUB_REPOSITORY